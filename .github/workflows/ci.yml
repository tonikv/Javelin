name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            aws/leaderboard/package-lock.json
      - run: npm ci
      - run: npm --prefix aws/leaderboard ci
      - run: npm run typecheck
      - run: npm --prefix aws/leaderboard run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm --prefix aws/leaderboard run test
      - run: npm run build
      - run: npm --prefix aws/leaderboard run build
