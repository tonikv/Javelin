name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_LEADERBOARD_API_BASE: ${{ vars.VITE_LEADERBOARD_API_BASE }}
      VITE_APP_VERSION: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Check leaderboard API base variable
        run: |
          if [ -z "${VITE_LEADERBOARD_API_BASE}" ]; then
            echo "warning: VITE_LEADERBOARD_API_BASE is not set. Global leaderboard will be unavailable in production build."
          fi
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
